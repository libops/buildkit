name: Build

on:
  workflow_call:
    inputs:
      repository:
        required: true
        type: string
      image:
        required: true
        type: string
      fallback-tag:
        required: true
        type: string
      version-tags:
        required: false
        type: boolean
        default: false
      build-images:
        required: false
        type: string
        default: "[]"
    outputs:
      digest:
        value: ${{ jobs.merge.outputs.digest }}
      context:
        description: "Context to use in dependent images"
        value: ${{ jobs.merge.outputs.context }}
    secrets:
      DOCKERHUB_USER:
        required: true
      DOCKERHUB_PASSWORD:
        required: true

jobs:
  build:
    strategy:
      matrix:
        runner: [ubuntu-24.04, ubuntu-24.04-arm]
    name: build-${{ matrix.runner }}
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: "actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10" # v6

      - name: Validate repository
        run: |
          set -euo pipefail
          set -x
          case "${{ inputs.repository }}" in
            libops|ghcr.io/libops)
              exit 0
              ;;
          esac

          exit 1

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - id: metadata
        name: Image metadata
        run: |
          set -euo pipefail

          MODE="fallback"
          if [ "${{ inputs.version-tags }}" = "true" ]; then
            MODE="version"
          fi

          TAGS="$(./ci/image-metadata.sh tags "${{ inputs.image }}" "$MODE" "${{ inputs.fallback-tag }}")"
          FIRST_TAG="$(./ci/image-metadata.sh first-tag "${{ inputs.image }}" "$MODE" "${{ inputs.fallback-tag }}")"
          CONTEXTS="$(./ci/image-metadata.sh contexts "${{ inputs.image }}" "${{ inputs.repository }}" "$MODE" "${{ inputs.fallback-tag }}" '${{ inputs.build-images }}')"
          PUBLISHED_IMAGE="$(./ci/image-metadata.sh published-image "${{ inputs.image }}")"

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "first-tag=${FIRST_TAG}" >> "$GITHUB_OUTPUT"
          echo "contexts=${CONTEXTS}" >> "$GITHUB_OUTPUT"
          echo "published-image=${PUBLISHED_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
        with:
          driver-opts: |
            image=moby/buildkit:v0.31.0
            network=host

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - id: build
        name: Build and push
        run: |
          set -ex
          PLATFORM="amd64"
          if [ "${{ matrix.runner }}" = "ubuntu-24.04-arm" ]; then
            PLATFORM="arm64"
          fi
          make push \
            "PROGRESS=plain" \
            "BUILDER=${{ steps.buildx.outputs.name }}" \
            "TARGET=${{ inputs.image }}-$PLATFORM" \
            "REPOSITORY=${{ inputs.repository }}" \
            "TAGS=${{ steps.metadata.outputs.first-tag }}" \
            "CONTEXTS=${{ steps.metadata.outputs.contexts }}"
  merge:
    runs-on: ubuntu-24.04
    outputs:
      digest: ${{ steps.build-push-manifest.outputs.digest }}
      context: ${{ steps.build-push-manifest.outputs.context }}
    needs:
      - build
    steps:
      - name: Checkout
        uses: "actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10" # v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Validate repository
        run: |
          set -euo pipefail
          case "${{ inputs.repository }}" in
            islandora|docker.io/islandora|ghcr.io/islandora-devops|ghcr.io/islandora-devops/*)
              echo "::error::Retired image namespace '${{ inputs.repository }}' must not be used; use libops and ghcr.io/libops."
              exit 1
              ;;
          esac

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: ghcr Login
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Create and push manifest list
        id: build-push-manifest
        run: |
          set -eou pipefail

          MODE="fallback"
          if [ "${{ inputs.version-tags }}" = "true" ]; then
            MODE="version"
          fi

          TAGS="$(./ci/image-metadata.sh tags "${{ inputs.image }}" "$MODE" "${{ inputs.fallback-tag }}")"
          FIRST_TAG="$(./ci/image-metadata.sh first-tag "${{ inputs.image }}" "$MODE" "${{ inputs.fallback-tag }}")"
          PUBLISHED_IMAGE="$(./ci/image-metadata.sh published-image "${{ inputs.image }}")"

          # Retry function with exponential backoff for rate limiting
          retry_with_backoff() {
            local max_attempts=5
            local attempt=1
            local delay=15
            while true; do
              if "$@"; then
                return 0
              fi
              if [ $attempt -ge $max_attempts ]; then
                echo "Command failed after $max_attempts attempts"
                return 1
              fi
              echo "Attempt $attempt failed, retrying in ${delay}s..."
              sleep $delay
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          REPOS=(
            "${{ inputs.repository }}"
            "ghcr.io/libops"
          )
          TAG_ARGS=""
          IMAGE=""
          for REPO in "${REPOS[@]}"; do
            for TAG in ${TAGS}; do
              # need to set digest/context below
              if [ "$IMAGE" = "" ]; then
                IMAGE="${{ inputs.repository }}/${PUBLISHED_IMAGE}:${TAG}"
              fi
              TAG_ARGS="${TAG_ARGS} -t ${REPO}/${PUBLISHED_IMAGE}:${TAG}"
            done
          done

          echo "Tagging ${TAG_ARGS}"

          # Extract the first tag to reference the source architectures
          BASE_IMAGE_REF="${{ inputs.repository }}/${PUBLISHED_IMAGE}:${FIRST_TAG}"

          retry_with_backoff docker buildx imagetools create \
            ${TAG_ARGS} \
            "${BASE_IMAGE_REF}-amd64" \
            "${BASE_IMAGE_REF}-arm64"

          DIGEST=$(docker buildx imagetools inspect "$IMAGE" | grep Digest | awk '{print $2}')
          echo "digest=-Pisle.${{ inputs.image }}.digest=${{ inputs.repository }}/${PUBLISHED_IMAGE}@$DIGEST" >> $GITHUB_OUTPUT
          echo "context=docker-image://${{ inputs.repository }}/${PUBLISHED_IMAGE}@$DIGEST" >> $GITHUB_OUTPUT
