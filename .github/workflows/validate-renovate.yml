name: validate renovate.json

on:
  pull_request:
    paths:
      - "renovate.json"

env:
  LOG_LEVEL: debug

jobs:
  renovate-config-validator:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - run: |
          set -eou pipefail
          docker run \
            --env LOG_LEVEL \
            --rm \
            -v $(pwd):/usr/src/app \
            renovate/renovate renovate-config-validator renovate.json5
