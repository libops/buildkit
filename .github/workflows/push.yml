name: Build and Push Docker Images
on:
  push:
    branches:
      - main
    paths-ignore:
      - "renovate.json"
      - "**/*.md"
  workflow_dispatch:
    inputs:
      image:
        description: "Single changed image to build with its dependents"
        required: false
        type: string
      all:
        description: "Build every image"
        required: false
        type: boolean
        default: false
      tag:
        description: "Fallback tag for unversioned images or non-main builds"
        required: false
        type: string
      version-tags:
        description: "Publish tags from the software version in each image"
        required: false
        type: boolean
        default: true
concurrency:
  group: ${{ github.ref }}-${{ inputs.tag && inputs.tag || github.ref_name }}
  cancel-in-progress: true
jobs:
  lint:
    runs-on: ubuntu-24.04
    name: "lint ${{ inputs.tag && inputs.tag || github.ref_name }}"
    steps:
      - uses: "actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10" # v6

      - name: lint
        run: shellcheck ci/*.sh

  plan:
    runs-on: ubuntu-24.04
    name: Plan affected images
    needs: lint
    outputs:
      images: ${{ steps.plan.outputs.images }}
      level0: ${{ steps.plan.outputs.level0 }}
      level1: ${{ steps.plan.outputs.level1 }}
      level2: ${{ steps.plan.outputs.level2 }}
      level3: ${{ steps.plan.outputs.level3 }}
      tests: ${{ steps.plan.outputs.tests }}
      test_level0: ${{ steps.plan.outputs.test_level0 }}
      test_level1: ${{ steps.plan.outputs.test_level1 }}
      test_level2: ${{ steps.plan.outputs.test_level2 }}
      test_level3: ${{ steps.plan.outputs.test_level3 }}
      has_builds: ${{ steps.plan.outputs.has_builds }}
    steps:
      - uses: "actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10" # v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - id: plan
        name: Plan
        env:
          BASE: ${{ github.event.before }}
          HEAD: ${{ github.sha }}
          IMAGE: ${{ inputs.image || '' }}
          ALL: ${{ inputs.all || false }}
        run: |
          set -euo pipefail

          args=(plan --head "$HEAD")

          if [ -n "$BASE" ] && [ "$BASE" != "0000000000000000000000000000000000000000" ]; then
            args+=(--base "$BASE")
          fi

          if [ -n "$IMAGE" ]; then
            args+=(--image "$IMAGE")
          fi

          if [ "$ALL" = "true" ]; then
            args+=(--all)
          fi

          ./ci/image-metadata.sh "${args[@]}" | tee build-plan.out
          cat build-plan.out >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          echo "Images: ${{ steps.plan.outputs.images }}"
          echo "Tests: ${{ steps.plan.outputs.tests }}"
          echo "Level 0 tests: ${{ steps.plan.outputs.test_level0 }}"
          echo "Level 1 tests: ${{ steps.plan.outputs.test_level1 }}"
          echo "Level 2 tests: ${{ steps.plan.outputs.test_level2 }}"
          echo "Level 3 tests: ${{ steps.plan.outputs.test_level3 }}"

  build-level-0:
    if: ${{ needs.plan.outputs.level0 != '[]' }}
    needs: plan
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.plan.outputs.level0) }}
    uses: ./.github/workflows/build.yml
    with:
      image: ${{ matrix.image }}
      repository: libops
      fallback-tag: ${{ inputs.tag && inputs.tag || github.ref_name }}
      version-tags: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') || inputs.version-tags || false }}
      build-images: ${{ needs.plan.outputs.images }}
    secrets: inherit
    permissions:
      contents: read
      packages: write

  build-level-1:
    if: ${{ always() && needs.plan.outputs.level1 != '[]' && !cancelled() && !failure() }}
    needs: [plan, build-level-0, test-level-0]
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.plan.outputs.level1) }}
    uses: ./.github/workflows/build.yml
    with:
      image: ${{ matrix.image }}
      repository: libops
      fallback-tag: ${{ inputs.tag && inputs.tag || github.ref_name }}
      version-tags: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') || inputs.version-tags || false }}
      build-images: ${{ needs.plan.outputs.images }}
    secrets: inherit
    permissions:
      contents: read
      packages: write

  build-level-2:
    if: ${{ always() && needs.plan.outputs.level2 != '[]' && !cancelled() && !failure() }}
    needs: [plan, build-level-0, test-level-0, build-level-1, test-level-1]
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.plan.outputs.level2) }}
    uses: ./.github/workflows/build.yml
    with:
      image: ${{ matrix.image }}
      repository: libops
      fallback-tag: ${{ inputs.tag && inputs.tag || github.ref_name }}
      version-tags: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') || inputs.version-tags || false }}
      build-images: ${{ needs.plan.outputs.images }}
    secrets: inherit
    permissions:
      contents: read
      packages: write

  build-level-3:
    if: ${{ always() && needs.plan.outputs.level3 != '[]' && !cancelled() && !failure() }}
    needs: [plan, build-level-0, test-level-0, build-level-1, test-level-1, build-level-2, test-level-2]
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.plan.outputs.level3) }}
    uses: ./.github/workflows/build.yml
    with:
      image: ${{ matrix.image }}
      repository: libops
      fallback-tag: ${{ inputs.tag && inputs.tag || github.ref_name }}
      version-tags: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') || inputs.version-tags || false }}
      build-images: ${{ needs.plan.outputs.images }}
    secrets: inherit
    permissions:
      contents: read
      packages: write

  test-level-0:
    if: ${{ always() && needs.plan.outputs.test_level0 != '[]' && !cancelled() && !failure() }}
    needs: [plan, build-level-0]
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.plan.outputs.test_level0) }}
    uses: ./.github/workflows/test.yml
    with:
      image: ${{ matrix.image }}
      repository: libops
      fallback-tag: ${{ inputs.tag && inputs.tag || github.ref_name }}
      version-tags: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') || inputs.version-tags || false }}
      build-images: ${{ needs.plan.outputs.images }}
    permissions:
      contents: read
      packages: read

  test-level-1:
    if: ${{ always() && needs.plan.outputs.test_level1 != '[]' && !cancelled() && !failure() }}
    needs: [plan, build-level-0, test-level-0, build-level-1]
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.plan.outputs.test_level1) }}
    uses: ./.github/workflows/test.yml
    with:
      image: ${{ matrix.image }}
      repository: libops
      fallback-tag: ${{ inputs.tag && inputs.tag || github.ref_name }}
      version-tags: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') || inputs.version-tags || false }}
      build-images: ${{ needs.plan.outputs.images }}
    permissions:
      contents: read
      packages: read

  test-level-2:
    if: ${{ always() && needs.plan.outputs.test_level2 != '[]' && !cancelled() && !failure() }}
    needs: [plan, build-level-0, test-level-0, build-level-1, test-level-1, build-level-2]
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.plan.outputs.test_level2) }}
    uses: ./.github/workflows/test.yml
    with:
      image: ${{ matrix.image }}
      repository: libops
      fallback-tag: ${{ inputs.tag && inputs.tag || github.ref_name }}
      version-tags: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') || inputs.version-tags || false }}
      build-images: ${{ needs.plan.outputs.images }}
    permissions:
      contents: read
      packages: read

  test-level-3:
    if: ${{ always() && needs.plan.outputs.test_level3 != '[]' && !cancelled() && !failure() }}
    needs: [plan, build-level-0, test-level-0, build-level-1, test-level-1, build-level-2, test-level-2, build-level-3]
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.plan.outputs.test_level3) }}
    uses: ./.github/workflows/test.yml
    with:
      image: ${{ matrix.image }}
      repository: libops
      fallback-tag: ${{ inputs.tag && inputs.tag || github.ref_name }}
      version-tags: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') || inputs.version-tags || false }}
      build-images: ${{ needs.plan.outputs.images }}
    permissions:
      contents: read
      packages: read
