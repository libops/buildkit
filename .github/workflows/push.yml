name: Build and Push Docker Images
on:
  push:
    branches: ["*"]
    paths:
      - "images/**"
  workflow_dispatch:
    inputs:
      image:
        description: "Single changed image to build with its dependents"
        required: false
        type: string
      all:
        description: "Build every image"
        required: false
        type: boolean
        default: false
      tag:
        description: "Fallback tag for unversioned images or non-main builds"
        required: false
        type: string
      version-tags:
        description: "Publish tags from the software version in each image"
        required: false
        type: boolean
        default: true
concurrency:
  group: ${{ github.ref }}-${{ inputs.tag && inputs.tag || github.ref_name }}
  cancel-in-progress: true
jobs:
  lint:
    runs-on: ubuntu-24.04
    name: "lint ${{ inputs.tag && inputs.tag || github.ref_name }}"
    steps:
      - uses: "actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10" # v6

      - name: lint
        run: shellcheck **/*.sh

  plan:
    runs-on: ubuntu-24.04
    name: Plan affected images
    needs: lint
    outputs:
      images: ${{ steps.plan.outputs.images }}
      level0: ${{ steps.plan.outputs.level0 }}
      level1: ${{ steps.plan.outputs.level1 }}
      level2: ${{ steps.plan.outputs.level2 }}
      level3: ${{ steps.plan.outputs.level3 }}
      level4: ${{ steps.plan.outputs.level4 }}
      tests: ${{ steps.plan.outputs.tests }}
      test_level0: ${{ steps.plan.outputs.test_level0 }}
      test_level1: ${{ steps.plan.outputs.test_level1 }}
      test_level2: ${{ steps.plan.outputs.test_level2 }}
      test_level3: ${{ steps.plan.outputs.test_level3 }}
      test_level4: ${{ steps.plan.outputs.test_level4 }}
      has_builds: ${{ steps.plan.outputs.has_builds }}
      sitectl_wp_image_tags: ${{ steps.plan.outputs.sitectl_wp_image_tags }}
      sitectl_omeka_s_image_tags: ${{ steps.plan.outputs.sitectl_omeka_s_image_tags }}
      sitectl_omeka_classic_image_tags: ${{ steps.plan.outputs.sitectl_omeka_classic_image_tags }}
      sitectl_ojs_image_tags: ${{ steps.plan.outputs.sitectl_ojs_image_tags }}
      sitectl_drupal_image_tags: ${{ steps.plan.outputs.sitectl_drupal_image_tags }}
      sitectl_isle_template_image_tags: ${{ steps.plan.outputs.sitectl_isle_template_image_tags }}
      sitectl_isle_libops_image_tags: ${{ steps.plan.outputs.sitectl_isle_libops_image_tags }}
      sitectl_isle_images: ${{ steps.plan.outputs.sitectl_isle_images }}
    steps:
      - uses: "actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10" # v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - id: plan
        name: Plan
        env:
          BASE: ${{ github.event.before }}
          HEAD: ${{ github.sha }}
          IMAGE: ${{ inputs.image || '' }}
          ALL: ${{ inputs.all || false }}
          FALLBACK_TAG: ${{ inputs.tag && inputs.tag || github.ref_name }}
          VERSION_TAGS: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') || inputs.version-tags || false }}
        run: |
          set -euo pipefail

          args=(plan --head "$HEAD")

          if [ -n "$BASE" ] && [ "$BASE" != "0000000000000000000000000000000000000000" ]; then
            args+=(--base "$BASE")
          fi

          if [ -n "$IMAGE" ]; then
            args+=(--image "$IMAGE")
          fi

          if [ "$ALL" = "true" ]; then
            args+=(--all)
          fi

          ./ci/image-metadata.sh "${args[@]}" | tee build-plan.out
          cat build-plan.out >> "$GITHUB_OUTPUT"

          mode="fallback"
          if [ "$VERSION_TAGS" = "true" ]; then
            mode="version"
          fi
          first_tag() {
            ./ci/image-metadata.sh first-tag "$1" "$mode" "$FALLBACK_TAG"
          }

          {
            echo "sitectl_wp_image_tags=wp=$(first_tag wp-php84)"
            echo "sitectl_omeka_s_image_tags=omeka-s=$(first_tag omeka-s-php84)"
            echo "sitectl_omeka_classic_image_tags=omeka-classic=$(first_tag omeka-classic-php84)"
            echo "sitectl_ojs_image_tags=ojs=$(first_tag ojs-php84)"
            echo "sitectl_drupal_image_tags=drupal=$(first_tag drupal-php84)"
            echo "sitectl_isle_template_image_tags=drupal=$(first_tag drupal-php84) activemq=$(first_tag activemq6) alpaca=$(first_tag alpaca) crayfits=$(first_tag crayfits) fits=$(first_tag fits) homarus=$(first_tag homarus) houdini=$(first_tag houdini) hypercube=$(first_tag hypercube) init=$(first_tag base) mariadb=$(first_tag mariadb11) mergepdf=$(first_tag mergepdf) solr=$(first_tag solr9)"
            echo "sitectl_isle_libops_image_tags=drupal=$(first_tag islandora-php84) activemq=$(first_tag activemq6) alpaca=$(first_tag alpaca) crayfits=$(first_tag crayfits) fits=$(first_tag fits) homarus=$(first_tag homarus) houdini=$(first_tag houdini) hypercube=$(first_tag hypercube) init=$(first_tag base) mariadb=$(first_tag mariadb11) mergepdf=$(first_tag mergepdf) solr=$(first_tag solr9)"
            echo "sitectl_isle_images="
          } >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          echo "Images: ${{ steps.plan.outputs.images }}"
          echo "Tests: ${{ steps.plan.outputs.tests }}"
          echo "Level 0 tests: ${{ steps.plan.outputs.test_level0 }}"
          echo "Level 1 tests: ${{ steps.plan.outputs.test_level1 }}"
          echo "Level 2 tests: ${{ steps.plan.outputs.test_level2 }}"
          echo "Level 3 tests: ${{ steps.plan.outputs.test_level3 }}"
          echo "Level 4 tests: ${{ steps.plan.outputs.test_level4 }}"
          echo "sitectl wp image tags: ${{ steps.plan.outputs.sitectl_wp_image_tags }}"
          echo "sitectl omeka-s image tags: ${{ steps.plan.outputs.sitectl_omeka_s_image_tags }}"
          echo "sitectl omeka-classic image tags: ${{ steps.plan.outputs.sitectl_omeka_classic_image_tags }}"
          echo "sitectl ojs image tags: ${{ steps.plan.outputs.sitectl_ojs_image_tags }}"
          echo "sitectl drupal image tags: ${{ steps.plan.outputs.sitectl_drupal_image_tags }}"
          echo "sitectl isle template image tags: ${{ steps.plan.outputs.sitectl_isle_template_image_tags }}"
          echo "sitectl isle libops image tags: ${{ steps.plan.outputs.sitectl_isle_libops_image_tags }}"

  build-level-0:
    if: ${{ needs.plan.outputs.level0 != '[]' }}
    needs: plan
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.plan.outputs.level0) }}
    uses: ./.github/workflows/build.yml
    with:
      image: ${{ matrix.image }}
      repository: libops
      fallback-tag: ${{ inputs.tag && inputs.tag || github.ref_name }}
      version-tags: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') || inputs.version-tags || false }}
      build-images: ${{ needs.plan.outputs.images }}
    secrets: inherit
    permissions:
      contents: read
      packages: write

  build-level-1:
    if: ${{ always() && needs.plan.outputs.level1 != '[]' && !cancelled() && !failure() }}
    needs: [plan, build-level-0]
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.plan.outputs.level1) }}
    uses: ./.github/workflows/build.yml
    with:
      image: ${{ matrix.image }}
      repository: libops
      fallback-tag: ${{ inputs.tag && inputs.tag || github.ref_name }}
      version-tags: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') || inputs.version-tags || false }}
      build-images: ${{ needs.plan.outputs.images }}
    secrets: inherit
    permissions:
      contents: read
      packages: write

  build-level-2:
    if: ${{ always() && needs.plan.outputs.level2 != '[]' && !cancelled() && !failure() }}
    needs: [plan, build-level-1]
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.plan.outputs.level2) }}
    uses: ./.github/workflows/build.yml
    with:
      image: ${{ matrix.image }}
      repository: libops
      fallback-tag: ${{ inputs.tag && inputs.tag || github.ref_name }}
      version-tags: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') || inputs.version-tags || false }}
      build-images: ${{ needs.plan.outputs.images }}
    secrets: inherit
    permissions:
      contents: read
      packages: write

  build-level-3:
    if: ${{ always() && needs.plan.outputs.level3 != '[]' && !cancelled() && !failure() }}
    needs: [plan, build-level-2]
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.plan.outputs.level3) }}
    uses: ./.github/workflows/build.yml
    with:
      image: ${{ matrix.image }}
      repository: libops
      fallback-tag: ${{ inputs.tag && inputs.tag || github.ref_name }}
      version-tags: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') || inputs.version-tags || false }}
      build-images: ${{ needs.plan.outputs.images }}
    secrets: inherit
    permissions:
      contents: read
      packages: write

  build-level-4:
    if: ${{ always() && needs.plan.outputs.level4 != '[]' && !cancelled() && !failure() }}
    needs: [plan, build-level-3]
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.plan.outputs.level4) }}
    uses: ./.github/workflows/build.yml
    with:
      image: ${{ matrix.image }}
      repository: libops
      fallback-tag: ${{ inputs.tag && inputs.tag || github.ref_name }}
      version-tags: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') || inputs.version-tags || false }}
      build-images: ${{ needs.plan.outputs.images }}
    secrets: inherit
    permissions:
      contents: read
      packages: write

  test-level-0:
    if: ${{ always() && needs.plan.outputs.test_level0 != '[]' && !cancelled() && !failure() }}
    needs: [plan, build-level-0]
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.plan.outputs.test_level0) }}
    uses: ./.github/workflows/test.yml
    with:
      image: ${{ matrix.image }}
      repository: libops
      fallback-tag: ${{ inputs.tag && inputs.tag || github.ref_name }}
      version-tags: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') || inputs.version-tags || false }}
      build-images: ${{ needs.plan.outputs.images }}
    permissions:
      contents: read
      packages: read

  test-level-1:
    if: ${{ always() && needs.plan.outputs.test_level1 != '[]' && !cancelled() && !failure() }}
    needs: [plan, build-level-1]
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.plan.outputs.test_level1) }}
    uses: ./.github/workflows/test.yml
    with:
      image: ${{ matrix.image }}
      repository: libops
      fallback-tag: ${{ inputs.tag && inputs.tag || github.ref_name }}
      version-tags: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') || inputs.version-tags || false }}
      build-images: ${{ needs.plan.outputs.images }}
    permissions:
      contents: read
      packages: read

  test-level-2:
    if: ${{ always() && needs.plan.outputs.test_level2 != '[]' && !cancelled() && !failure() }}
    needs: [plan, build-level-2]
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.plan.outputs.test_level2) }}
    uses: ./.github/workflows/test.yml
    with:
      image: ${{ matrix.image }}
      repository: libops
      fallback-tag: ${{ inputs.tag && inputs.tag || github.ref_name }}
      version-tags: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') || inputs.version-tags || false }}
      build-images: ${{ needs.plan.outputs.images }}
    permissions:
      contents: read
      packages: read

  test-level-3:
    if: ${{ always() && needs.plan.outputs.test_level3 != '[]' && !cancelled() && !failure() }}
    needs: [plan, build-level-3]
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.plan.outputs.test_level3) }}
    uses: ./.github/workflows/test.yml
    with:
      image: ${{ matrix.image }}
      repository: libops
      fallback-tag: ${{ inputs.tag && inputs.tag || github.ref_name }}
      version-tags: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') || inputs.version-tags || false }}
      build-images: ${{ needs.plan.outputs.images }}
    permissions:
      contents: read
      packages: read

  test-level-4:
    if: ${{ always() && needs.plan.outputs.test_level4 != '[]' && !cancelled() && !failure() }}
    needs: [plan, build-level-4]
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.plan.outputs.test_level4) }}
    uses: ./.github/workflows/test.yml
    with:
      image: ${{ matrix.image }}
      repository: libops
      fallback-tag: ${{ inputs.tag && inputs.tag || github.ref_name }}
      version-tags: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') || inputs.version-tags || false }}
      build-images: ${{ needs.plan.outputs.images }}
    permissions:
      contents: read
      packages: read

  sitectl-create-smoke-test:
    if: ${{ always() && !cancelled() && !failure() }}
    needs: [plan, test-level-4]
    strategy:
      fail-fast: false
      matrix:
        include:
          - plugin: wp
            packages: sitectl sitectl-wp
            create-args: ""
            image-tags: ${{ needs.plan.outputs.sitectl_wp_image_tags }}
            images: ""
          - plugin: omeka-s
            packages: sitectl sitectl-omeka-s
            create-args: ""
            image-tags: ${{ needs.plan.outputs.sitectl_omeka_s_image_tags }}
            images: ""
          - plugin: omeka-classic
            packages: sitectl sitectl-omeka-classic
            create-args: ""
            image-tags: ${{ needs.plan.outputs.sitectl_omeka_classic_image_tags }}
            images: ""
          - plugin: ojs
            packages: sitectl sitectl-ojs
            create-args: ""
            image-tags: ${{ needs.plan.outputs.sitectl_ojs_image_tags }}
            images: ""
          - plugin: drupal
            packages: sitectl sitectl-drupal
            create-args: ""
            image-tags: ${{ needs.plan.outputs.sitectl_drupal_image_tags }}
            images: ""
          - plugin: isle
            packages: sitectl sitectl-isle sitectl-drupal
            create-args: >-
              --template-repo https://github.com/Islandora-Devops/isle-site-template
              --fcrepo off
              --blazegraph off
              --isle-file-system-uri private
              --iiif triplet
              --iiif-topology disabled
              --bot-mitigation off
            image-tags: ${{ needs.plan.outputs.sitectl_isle_template_image_tags }}
            images: ${{ needs.plan.outputs.sitectl_isle_images }}
          - plugin: isle
            packages: sitectl sitectl-isle sitectl-drupal
            create-args: >-
              --template-repo https://github.com/libops/isle
              --fcrepo off
              --blazegraph off
              --isle-file-system-uri private
              --iiif triplet
              --iiif-topology disabled
              --bot-mitigation off
            image-tags: ${{ needs.plan.outputs.sitectl_isle_libops_image_tags }}
            images: ${{ needs.plan.outputs.sitectl_isle_images }}

    uses: libops/.github/.github/workflows/sitectl-create-smoke-test.yaml@main
    with:
      plugin: ${{ matrix.plugin }}
      create-definition: default
      create-args: ${{ matrix.create-args }}
      checkout-source: template
      project-path: generated-${{ matrix.plugin }}
      image-tags: ${{ matrix.image-tags }}
      images: ${{ matrix.images }}
      packages: ${{ matrix.packages }}
    permissions:
      contents: read
