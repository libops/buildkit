name: Test Docker Image

on:
  workflow_call:
    inputs:
      repository:
        required: true
        type: string
      image:
        required: true
        type: string
      fallback-tag:
        required: true
        type: string
      version-tags:
        required: false
        type: boolean
        default: false
      build-images:
        required: false
        type: string
        default: "[]"

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Test
        run: |
          set -euo pipefail

          MODE="fallback"
          if [ "${{ inputs.version-tags }}" = "true" ]; then
            MODE="version"
          fi

          go run ./cmd/buildkit test \
            --image "${{ inputs.image }}" \
            --repository "${{ inputs.repository }}" \
            --mode "$MODE" \
            --tag "${{ inputs.fallback-tag }}" \
            --build-images-json '${{ inputs.build-images }}' \
            --pull
