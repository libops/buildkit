---
# Common to all services
x-common: &common
  restart: "no"

name: solr9-servicestartswithcustommodules
services:
  solr:
    <<: *common
    image: ${SOLR9:-libops/solr:local-9}
    environment:
      SOLR_MODULES: extraction
    volumes:
      - ./test.sh:/test.sh # Test to run.
    command:
      - /test.sh # Run test and exit.
