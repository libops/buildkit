---
# Common to all services
x-common: &common
  restart: "no"

name: fcrepo6-servicehealthcheck
services:
  activemq:
    <<: *common
    image: ${ACTIVEMQ:-libops/activemq:local}
  fcrepo:
    volumes:
      - ./test.sh:/test.sh # Test to run.
    command:
      - /test.sh # Run test and exit.
    image: ${FCREPO6:-libops/fcrepo:local-6}
    depends_on:
      - activemq
